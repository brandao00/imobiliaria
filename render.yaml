services:
  - type: web
    name: imobiliaria-admin
    env: python
    plan: starter
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app
    autoDeploy: true
    envVars:
      - key: SECRET_KEY
        generateValue: true
      - key: ADMIN_EMAIL
        value: admin@imobiliaria.com
      - key: ADMIN_PASSWORD
        value: 123456
      - key: DATA_DIR
        value: /opt/render/project/src/data
      - key: PYTHON_VERSION
        value: 3.11.9
    disks:
      - name: imobiliaria-data
        mountPath: /opt/render/project/src/data
        sizeGB: 1
